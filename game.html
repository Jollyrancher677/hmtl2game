<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pac-Man | Elijah Edition</title>
    <style>
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
        }
        canvas { 
            border: 4px solid #4361ee; 
            box-shadow: 0 0 20px rgba(67, 97, 238, 0.5);
        }
        .stats { font-size: 24px; margin-bottom: 10px; color: yellow; }
        .back-btn { 
            margin-top: 20px; 
            padding: 10px 20px; 
            background: #4361ee; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
        }
    </style>
</head>
<body>
    <div class="stats">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="240"></canvas>
    <a href="index.html" class="back-btn">Return Home</a>

    <script src="game.js"></script>
</body>
</html>
