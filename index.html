    <script>
    const bg = document.querySelector('.bg-visual');
    
    window.addEventListener('mousemove', (e) => {
        // Calculate mouse position as a percentage of the window
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        
        // Update the CSS variables on the background div
        bg.style.setProperty('--mouse-x', x + '%');
        bg.style.setProperty('--mouse-y', y + '%');
    });
</script>
